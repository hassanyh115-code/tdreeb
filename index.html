<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>يزيد المفرح</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    a { text-decoration: none; color: inherit; }

    .navbar {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: space-between;
      padding: 16px 40px;
    }

    .nav-link {
      cursor: pointer;
      margin: 0 10px;
    }

    .hero {
      height: 60vh;
      background:
        linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.7)),
        url('yzed.jpg') center/cover no-repeat;
    }

    .section {
      display: none;
      padding: 60px 20px;
    }

    .section.active {
      display: block;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .title {
      text-align: center;
      color: #d4af37;
      font-size: 32px;
      margin-bottom: 30px;
    }

    .card {
      background: #171717;
      padding: 20px;
      margin: 10px;
      border-radius: 12px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #d4af37;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div>
      <span class="nav-link" onclick="show('about')">عني</span>
    </div>

    <div>
      <span class="nav-link" onclick="show('pricing')">الأسعار</span>
      <span class="nav-link" onclick="show('reviews')">الآراء</span>
      <span class="nav-link" onclick="show('register')">التسجيل</span>
    </div>
  </div>

  <!-- صورة بدون كتابة -->
  <div class="hero"></div>

  <!-- عني -->
  <div id="about" class="section active">
    <div class="container">
      <div class="title">عني</div>
      <div class="card">
        يزيد المفرح أعظم مدرب 💪🔥
      </div>
    </div>
  </div>

  <!-- الأسعار -->
  <div id="pricing" class="section">
    <div class="container">
      <div class="title">الأسعار</div>

      <div class="card">شهر - 150 ريال</div>
      <div class="card">شهرين - 250 ريال</div>
      <div class="card">3 شهور - 350 ريال</div>

    </div>
  </div>

  <!-- الآراء -->
  <div id="reviews" class="section">
    <div class="container">
      <div class="title">آراء المتدربين</div>

      <div class="card">review1.jpg</div>
      <div class="card">review2.jpg</div>
      <div class="card">review3.jpg</div>

    </div>
  </div>

  <!-- التسجيل -->
  <div id="register" class="section">
    <div class="container">
      <div class="title">التسجيل</div>

      <form id="form">
        <input name="name" placeholder="الاسم" required />
        <input name="age" placeholder="العمر" required />
        <input name="height" placeholder="الطول" required />
        <input name="goal" placeholder="الهدف" required />
        <input name="weight" placeholder="الوزن" required />
        <button>تسجيل</button>
      </form>

      <div id="status"></div>
    </div>
  </div>

  <script>
    function show(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo(0,0);
    }

    const form = document.getElementById("form");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      fetch("https://script.google.com/macros/s/AKfycby2NdtRThFZeeQKq8qY3pMWAhKCp0q-8K0RpV4xZYM_D6tXG0l06NPlw-JxxY-G9h07eg/exec", {
        method: "POST",
        body: JSON.stringify({
          name: form.name.value,
          age: form.age.value,
          height: form.height.value,
          goal: form.goal.value,
          weight: form.weight.value
        })
      });

      document.getElementById("status").innerText = "تم الإرسال ✅";
      form.reset();
    });
  </script>

</body>
</html>
